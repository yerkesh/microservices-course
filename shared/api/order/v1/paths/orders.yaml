post:
  summary: Создать заказ
  description: Создаёт новый заказ на постройку космического корабля
  operationId: createOrder
  tags:
    - Orders
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/create_order_request.yaml'
  responses:
    '201':
      description: Заказ успешно создан
      content:
        application/json:
          schema:
            $ref: '../components/create_order_response.yaml'
    '400':
      description: Невалидный запрос
      content:
        application/json:
          schema:
            $ref: '../components/errors/error.yaml'
    '404':
      description: Компонент не найден
      content:
        application/json:
          schema:
            $ref: '../components/errors/error.yaml'
    '409':
      description: Компонент отсутствует на складе
      content:
        application/json:
          schema:
            $ref: '../components/errors/error.yaml'
    '500':
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '../components/errors/error.yaml'
