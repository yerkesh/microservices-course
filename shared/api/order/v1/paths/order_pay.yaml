post:
  summary: Оплатить заказ
  description: Проводит оплату заказа
  operationId: payOrder
  tags:
    - Orders
  parameters:
    - $ref: '../params/order_uuid.yaml'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../components/pay_order_request.yaml'
  responses:
    '200':
      description: Оплата прошла успешно
      content:
        application/json:
          schema:
            $ref: '../components/pay_order_response.yaml'
    '400':
      description: Невалидный запрос
      content:
        application/json:
          schema:
            $ref: '../components/errors/error.yaml'
    '404':
      description: Заказ не найден
      content:
        application/json:
          schema:
            $ref: '../components/errors/error.yaml'
    '409':
      description: Заказ уже оплачен или отменён
      content:
        application/json:
          schema:
            $ref: '../components/errors/error.yaml'
    '500':
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: '../components/errors/error.yaml'
