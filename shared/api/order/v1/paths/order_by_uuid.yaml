parameters:
  - $ref: ../params/order_uuid.yaml

get:
  summary: Получить заказ по UUID
  description: Возвращает полную информацию о заказе на постройку космического корабля
  operationId: getOrder
  tags:
    - Orders
  responses:
    '200':
      description: Заказ успешно найден
      content:
        application/json:
          schema:
            $ref: ../components/order_dto.yaml
    '400':
      description: Невалидный формат UUID
      content:
        application/json:
          schema:
            $ref: ../components/errors/error.yaml
    '404':
      description: Заказ с указанным UUID не найден
      content:
        application/json:
          schema:
            $ref: ../components/errors/error.yaml
    '500':
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema:
            $ref: ../components/errors/error.yaml
