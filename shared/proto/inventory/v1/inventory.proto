syntax = "proto3";

package inventory.v1;

// TODO: Заменить на актуальный go_package
option go_package = "github.com/yerkesh/shared/pkg/proto/inventory/v1;inventoryv1";

import "google/protobuf/timestamp.proto";

// InventoryService управляет каталогом деталей для космических кораблей
service InventoryService {
  // GetPart возвращает деталь по UUID
  rpc GetPart(GetPartRequest) returns (GetPartResponse);

  // TODO: Добавить метод ListParts
}

// Тип детали
enum PartType {
  PART_TYPE_UNSPECIFIED = 0;
  PART_TYPE_HULL = 1;
  PART_TYPE_ENGINE = 2;
  // TODO: Добавить остальные типы деталей из описания задания
}

// Part представляет деталь космического корабля
message Part {
  // Уникальный идентификатор детали
  string uuid = 1;

  // Название детали
  string name = 2;

  // Описание детали
  string description = 3;

  // Цена в копейках (5000₽ = 500000)
  int64 price = 4;

  // TODO: Добавить остальные поля из описания задания
}

// Запрос на получение детали по UUID
message GetPartRequest {
  string uuid = 1;
}

